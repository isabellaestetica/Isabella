<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISA · Estética Avançada</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bege: #e4e0d5;
      --bege-escuro: #D4C9BB;
      --marrom: #4A3F35;
      --marrom-claro: #6B5C50;
      --texto: #3A3028;
    }

    body {
      background: #e4e0d5;
      min-height: 100vh;
      font-family: 'Jost', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 64px;
    }

    .logo-wrap {
      width: 220px;
      margin-bottom: 8px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.1s;
    }

    .logo-wrap img {
      width: 100%;
      display: block;
    }

    .frase {
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px;
      font-style: italic;
      font-weight: 300;
      color: var(--marrom-claro);
      text-align: center;
      margin-bottom: 6px;
      max-width: 300px;
      line-height: 1.5;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.25s;
    }

    .tagline {
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--marrom-claro);
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.3s;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--marrom-claro);
      opacity: 0.3;
      margin-bottom: 40px;
      animation: fadeUp 0.8s ease forwards 0.4s;
    }

    .links {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 24px;
      background: rgba(255,255,255,0.5);
      border: 1px solid rgba(74,63,53,0.12);
      border-radius: 2px;
      text-decoration: none;
      color: var(--texto);
      transition: all 0.3s ease;
      opacity: 0;
      backdrop-filter: blur(4px);
    }

    .link-btn:nth-child(1) { animation: fadeUp 0.7s ease forwards 0.5s; }
    .link-btn:nth-child(2) { animation: fadeUp 0.7s ease forwards 0.65s; }
    .link-btn:nth-child(3) { animation: fadeUp 0.7s ease forwards 0.8s; }

    .link-btn:hover {
      background: rgba(255,255,255,0.85);
      border-color: rgba(74,63,53,0.3);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(74,63,53,0.08);
    }

    .link-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--marrom);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-icon svg {
      width: 18px;
      height: 18px;
      fill: var(--bege);
    }

    .link-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .link-label {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--marrom-claro);
    }

    .link-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px;
      font-weight: 400;
      color: var(--texto);
      letter-spacing: 0.3px;
    }

    .link-arrow {
      margin-left: auto;
      color: var(--marrom-claro);
      opacity: 0.5;
      font-size: 18px;
    }

    .footer {
      margin-top: 48px;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--marrom-claro);
      opacity: 0.4;
      animation: fadeUp 0.8s ease forwards 1.1s;
      opacity: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
